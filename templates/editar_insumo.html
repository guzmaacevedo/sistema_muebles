<!DOCTYPE html>
<html>
<head>
    <title>Editar Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">
    <h1>Agregar Stock a Insumo</h1>

    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST">
        <div class="mb-3">
            <label class="form-label">Nombre del insumo:</label>
            <input type="text" class="form-control" value="{{ insumo.nombre }}" disabled>
        </div>

        <div class="mb-3">
            <label class="form-label">Cantidad a agregar:</label>
            <input type="number" step="0.01" name="cantidad" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Actualizar Stock</button>
        <a href="{{ url_for('ver_insumos') }}" class="btn btn-secondary">Volver</a>
    </form>
</body>
</html>
