<!DOCTYPE html>
<html>
<head>
    <title>Historial de Ventas</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-5">
    <h1 class="mb-4">📊 Historial de Ventas</h1>

    <table class="table table-striped table-hover">
        <thead>
            <tr>
                <th>Producto</th>
                <th>Cantidad</th>
                <th>Fecha y Hora</th>

            </tr>
        </thead>
        <tbody>
            {% for venta in ventas %}
            <tr>
                <td>{{ venta.producto.nombre }}</td>
                <td>{{ venta.cantidad }}</td>
                <td>{{ venta.fecha_hora.strftime('%d/%m/%Y %H:%M') if venta.fecha_hora else 'Sin fecha' }} </td>

            </tr>
            {% else %}
            <tr><td colspan="3">No hay ventas registradas.</td></tr>
            {% endfor %}
        </tbody>
    </table>

    <a href="{{ url_for('index') }}" class="btn btn-secondary">⬅️ Volver al inicio</a>
</body>
</html>
