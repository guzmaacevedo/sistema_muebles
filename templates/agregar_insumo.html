<!DOCTYPE html>
<html>
<head>
    <title>Agregar Insumo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow rounded">
            <div class="card-body">
                <h2 class="card-title mb-4 text-center">Agregar Nuevo Insumo</h2>

                <form method="POST">
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="unidad" class="form-label">Unidad</label>
                        <input type="text" id="unidad" name="unidad" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="stock" class="form-label">Stock Actual</label>
                        <input type="number" id="stock" name="stock" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label for="stock_minimo" class="form-label">Stock Mínimo</label>
                        <input type="number" id="stock_minimo" name="stock_minimo" class="form-control" required>
                    </div>

                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('ver_insumos') }}" class="btn btn-secondary">⬅️ Volver</a>
                        <button type="submit" class="btn btn-primary">➕ Agregar Insumo</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
