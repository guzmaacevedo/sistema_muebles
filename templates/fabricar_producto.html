<!DOCTYPE html>
<html>
<head>
    <title>Fabricar Producto</title>
    <!-- Agrega Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h1 class="mb-4">Fabricar Producto</h1>

    <!-- Mostrar mensajes flash con estilo -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Cerrar"></button>
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <!-- Formulario de fabricación -->
    <form method="POST" class="mb-4">
        <div class="mb-3">
            <label for="producto" class="form-label">Producto:</label>
            <select name="producto_id" class="form-select" required>
                {% for producto in productos %}
                    <option value="{{ producto.id }}">{{ producto.nombre }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="mb-3">
            <label for="cantidad" class="form-label">Cantidad a fabricar:</label>
            <input type="number" name="cantidad" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary">Fabricar</button>
    </form>

    <a href="{{ url_for('index') }}" class="btn btn-secondary">Volver al inicio</a>

    <!-- Script de Bootstrap para alertas -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
