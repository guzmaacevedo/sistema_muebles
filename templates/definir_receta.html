<h1>Definir receta para {{ producto.nombre }}</h1>

<form method="post">
    <label>Insumo:</label>
    <select name="insumo_id">
        {% for insumo in insumos %}
            <option value="{{ insumo.id }}">{{ insumo.nombre }}</option>
        {% endfor %}
    </select>
    <label>Cantidad:</label>
    <input type="number" step="0.01" name="cantidad" required>
    <button type="submit">Agregar</button>
</form>

<h2>Receta actual:</h2>
<ul>
    {% for item in receta %}
        <li>{{ item.cantidad }} {{ item.insumo.unidad }} de {{ item.insumo.nombre }}</li>
    {% endfor %}
</ul>

<a href="{{ url_for('ver_productos') }}">Volver a productos</a>
